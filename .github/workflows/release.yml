name: Build & Release

# v ile baslayan bir tag push edildiginde (orn. v1.0.0) calisir.
# Hem macOS hem Windows kurulumlarini olusturup GitHub Releases'e yukler.
# Boylece otomatik guncelleme (electron-updater) bu release'leri gorur.
#
# IMZALAMA: ilgili secret'lar tanimliysa imzalar; degilse imzasiz build uretir.
#   (Secret'i bos string olarak gecmek electron-builder'i bozdugu icin
#    degiskenler yalnizca secret mevcutsa $GITHUB_ENV'e yazilir.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure macOS signing
        shell: bash
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then
            echo "Sertifika bulundu - imzalanacak."
            echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"

            # Notarization - YONTEM 1: App Store Connect API Key (onerilen)
            if [ -n "${{ secrets.APPLE_API_KEY_ID }}" ]; then
              echo "Notarization: App Store Connect API Key kullanilacak."
              echo "${{ secrets.APPLE_API_KEY_B64 }}" | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"
              echo "APPLE_API_KEY=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
              echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
              echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"
            # Notarization - YONTEM 2: Apple ID + app-specific password
            elif [ -n "${{ secrets.APPLE_ID }}" ]; then
              echo "Notarization: Apple ID + app-specific password kullanilacak."
              echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            else
              echo "Notarization secret'i yok - imzali ama notarize edilmemis build."
            fi
          else
            echo "Sertifika yok - imzasiz build uretilecek."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build & publish (macOS)
        run: npm run dist:mac -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Windows signing
        shell: bash
        run: |
          if [ -n "${{ secrets.WIN_CSC_LINK }}" ]; then
            echo "Sertifika bulundu - imzalanacak."
            echo "CSC_LINK=${{ secrets.WIN_CSC_LINK }}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.WIN_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          else
            echo "Sertifika yok - imzasiz build uretilecek."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build & publish (Windows)
        run: npm run dist:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
